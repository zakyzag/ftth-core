<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin FTTH</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #060d1f;
    font-family: 'Inter', sans-serif;
    position: relative;
    overflow: hidden;
  }

  /* Background fiber optic glow effect */
  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    right: -10%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(6,182,212,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    position: relative;
    z-index: 1;
  }

  .logo-area {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, #6366f1, #06b6d4);
    border-radius: 14px;
    margin-bottom: 14px;
  }

  .logo-icon svg {
    width: 26px;
    height: 26px;
    fill: white;
  }

  .logo-area h1 {
    color: #ffffff;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .logo-area p {
    color: #6b7280;
    font-size: 13px;
    margin-top: 4px;
  }

  .field {
    margin-bottom: 16px;
  }

  label {
    display: block;
    color: #9ca3af;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    stroke: #4b5563;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    pointer-events: none;
  }

  input {
    width: 100%;
    padding: 12px 14px 12px 40px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: #f3f4f6;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  input::placeholder {
    color: #4b5563;
  }

  input:focus {
    border-color: #6366f1;
    background: rgba(99,102,241,0.07);
  }

  .btn-login {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
  }

  .btn-login:hover:not(:disabled) {
    opacity: 0.9;
    transform: translateY(-1px);
  }

  .btn-login:active:not(:disabled) {
    transform: translateY(0);
  }

  .btn-login:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .status {
    min-height: 20px;
    text-align: center;
    font-size: 13px;
    margin-top: 14px;
    border-radius: 8px;
    padding: 0;
    transition: all 0.2s;
  }

  .status.error {
    color: #f87171;
    background: rgba(248,113,113,0.08);
    padding: 10px;
  }

  .status.success {
    color: #34d399;
    background: rgba(52,211,153,0.08);
    padding: 10px;
  }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 24px 0 20px;
  }

  .footer-note {
    text-align: center;
    color: #374151;
    font-size: 11px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo-area">
    <div class="logo-icon">
      <!-- Fiber/signal icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 6C1 6 5 2 12 2s11 4 11 4M5 10s2-2 7-2 7 2 7 2M9 14s1-1 3-1 3 1 3 1M12 18v.01"/>
      </svg>
    </div>
    <h1>FTTH Admin</h1>
    <p>Masuk ke panel manajemen</p>
  </div>

  <div class="field">
    <label>Email</label>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
      <input type="email" id="email" placeholder="admin@example.com" autocomplete="email">
    </div>
  </div>

  <div class="field">
    <label>Password</label>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
  </div>

  <button class="btn-login" onclick="login()" id="loginBtn">Masuk</button>

  <div class="status" id="status"></div>

  <div class="divider"></div>
  <p class="footer-note">ASRLink Fiber &copy; 2025</p>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA3TToQTNLjLUwXGNktHri1U--EgUwP1u0",
    authDomain: "asrlink-fiber.firebaseapp.com",
    projectId: "asrlink-fiber",
    storageBucket: "asrlink-fiber.firebasestorage.app",
    messagingSenderId: "412248138112",
    appId: "1:412248138112:web:7e8be6884922e183252165",
    measurementId: "G-PVSWC2WHN5"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // Allow login with Enter key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') login();
  });

  async function login() {
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn      = document.getElementById("loginBtn");
    const status   = document.getElementById("status");

    // Reset status
    status.className = 'status';
    status.innerText = '';

    if (!email || !password) {
      status.className = 'status error';
      status.innerText = 'Email dan password wajib diisi.';
      return;
    }

    btn.disabled  = true;
    btn.innerText = 'Memuat...';

    try {
      const userCred = await firebase.auth().signInWithEmailAndPassword(email, password);
      const uid = userCred.user.uid;

      // Cek role di Firestore
      const doc = await db.collection("users").doc(uid).get();
      const role = doc.exists ? (doc.data().role || "viewer") : "viewer";
      sessionStorage.setItem("userRole", role);

      status.className = 'status success';
      status.innerText = 'Login berhasil! Mengalihkan...';

      setTimeout(() => { window.location.href = "index.html"; }, 800);

    } catch (error) {
      console.log("Firebase error code:", error.code);
      let msg = 'Email atau password salah.';
      if (error.code === 'auth/user-not-found')     msg = 'Akun tidak ditemukan.';
      if (error.code === 'auth/wrong-password')      msg = 'Password salah.';
      if (error.code === 'auth/invalid-email')       msg = 'Format email tidak valid.';
      if (error.code === 'auth/too-many-requests')   msg = 'Terlalu banyak percobaan. Coba lagi nanti.';
      if (error.code === 'auth/invalid-credential')  msg = 'Email atau password salah.';
      if (error.code === 'auth/network-request-failed') msg = 'Gagal koneksi. Cek internet kamu.';

      status.className = 'status error';
      status.innerText = msg + ' (' + error.code + ')';

      btn.disabled  = false;
      btn.innerText = 'Masuk';
    }
  }
</script>

</body>
</html>
