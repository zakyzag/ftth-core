<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin FTTH</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#081028;
  font-family:sans-serif;
}

.login-box{
  background:#111c44;
  padding:30px;
  border-radius:15px;
  width:320px;
}

h2{
  color:white;
  text-align:center;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  background:#4f46e5;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

p{
  color:#f87171;
  text-align:center;
  margin-top:10px;
  font-size:14px;
}
</style>
</head>
<body>

<div class="login-box">
  <h2>FTTH ADMIN</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()" id="loginBtn">Login</button>

  <p id="status"></p>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA3TToQTNLjLUwXGNktHri1U--EgUwP1u0",
  authDomain: "asrlink-fiber.firebaseapp.com",
  projectId: "asrlink-fiber",
  storageBucket: "asrlink-fiber.firebasestorage.app",
  messagingSenderId: "412248138112",
  appId: "1:412248138112:web:7e8be6884922e183252165",
  measurementId: "G-PVSWC2WHN5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const btn = document.getElementById("loginBtn");
  const status = document.getElementById("status");

  if (!email || !password) {
    status.innerText = "Email dan password wajib diisi.";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Memuat...";
  status.innerText = "";

  try {
    const userCred = await firebase.auth().signInWithEmailAndPassword(email, password);
    const uid = userCred.user.uid;

    // Cek role di Firestore
    const doc = await db.collection("users").doc(uid).get();

    if (doc.exists) {
      const role = doc.data().role;
      // Simpan role di sessionStorage supaya bisa dibaca di index.html
      sessionStorage.setItem("userRole", role);
    } else {
      // Kalau tidak ada di koleksi users, anggap viewer
      sessionStorage.setItem("userRole", "viewer");
    }

    window.location.href = "index.html";

  } catch (error) {
    status.innerText = "Email atau password salah.";
    btn.disabled = false;
    btn.innerText = "Login";
  }
}
</script>

</body>
</html>
